<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">
            <i class="bi bi-shield-lock"></i> Login
          </h3>

          @if (erro) {
            <div class="alert alert-danger">
              <i class="bi bi-exclamation-triangle"></i> {{ erro }}
            </div>
          }

          <form (ngSubmit)="fazerLogin()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="admin@chamados.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" class="form-control" [(ngModel)]="senha" name="senha" required placeholder="123456">
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="carregando">
              @if (carregando) {
                <span class="spinner-border spinner-border-sm"></span> Entrando...
              } @else {
                <i class="bi bi-box-arrow-in-right"></i> Entrar
              }
            </button>
          </form>

          <div class="mt-3 text-center text-muted">
            <small>Email: admin@chamados.com | Senha: 123456</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
